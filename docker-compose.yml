services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  gateway:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - auth
      - processor

  auth:
    build: ./services/auth
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      - db

  processor:
    build: ./services/processor
    env_file: .env
    ports:
      - "8002:8002"
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
