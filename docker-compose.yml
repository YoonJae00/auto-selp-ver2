services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  gateway:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - auth
      - processor

  auth:
    build: ./services/auth
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      - db

  processor:
    build: ./services/processor
    env_file: .env
    ports:
      - "8002:8002"
    depends_on:
      - db
      - redis
    volumes:
      - uploads_data:/app/uploads

  worker:
    build: ./services/processor
    command: celery -A tasks.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - uploads_data:/app/uploads
    restart: always

  kipris-mcp:
    image: python:3.11-slim
    command: >
      bash -c "apt-get update && apt-get install -y git &&
      git clone https://github.com/nuri428/mcp_kipris.git /app &&
      cd /app && pip install uv && uv sync && uv pip install fastapi uvicorn pydantic &&
      uv run python /wrapper/kipris_wrapper.py"
    environment:
      - KIPRIS_API_KEY=${KIPRIS_API_KEY}
    ports:
      - "8080:8080"
    volumes:
      - ./kipris_wrapper.py:/wrapper/kipris_wrapper.py

volumes:
  postgres_data:
  uploads_data:
