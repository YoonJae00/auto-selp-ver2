services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  gateway:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - auth
      - processor
      - marketplace

  auth:
    build: ./services/auth
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy

  processor:
    build: ./services/processor
    env_file: .env
    ports:
      - "8002:8002"
    depends_on:
      - db
      - redis
    volumes:
      - uploads_data:/app/uploads

  worker:
    build: ./services/processor
    command: celery -A tasks.celery_app worker --loglevel=info -Q processor
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - uploads_data:/app/uploads
    restart: always

  image-worker:
    build: ./services/processor
    command: celery -A tasks.celery_app worker --loglevel=info -Q image --concurrency=1
    env_file: .env
    environment:
      U2NET_HOME: /app/uploads/.u2net
    depends_on:
      - db
      - redis
    volumes:
      - uploads_data:/app/uploads
    restart: always

  marketplace:
    build: ./services/marketplace
    env_file: .env
    ports:
      - "8003:8003"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  marketplace-worker:
    build: ./services/marketplace
    command: celery -A tasks.celery_app worker --loglevel=info -Q marketplace
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

volumes:
  postgres_data:
  uploads_data:
